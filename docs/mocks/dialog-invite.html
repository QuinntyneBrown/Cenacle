<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cenacle — Invite to the room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/cenacle.css">
<style>
  html,body{height:100%}
  /* simplified room-host stage behind the scrim */
  .back{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
  .back__bar{flex:none;border-bottom:1px solid var(--hairline);background:color-mix(in srgb,var(--bg) 70%,transparent);backdrop-filter:blur(12px)}
  .back__bar .inner{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);height:60px;padding-inline:var(--sp-5)}
  .back__stagewrap{flex:1;min-height:0;padding:var(--sp-5)}
  .back__stage{position:relative;height:100%;border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--border);background:linear-gradient(160deg,#13273c,#0a1420);box-shadow:var(--shadow-lg)}
  .back__glow{position:absolute;inset:0;background:radial-gradient(55% 65% at 50% 34%,rgba(228,146,58,.22),transparent 72%);animation:breathe 11s var(--ease) infinite}
  .back__fill{position:absolute;inset:0;background:radial-gradient(120% 120% at 40% 20%,#28405a,#0c1a29)}

  /* QR placeholder — plausible, not scannable */
  .qr{
    position:relative;width:140px;height:140px;border-radius:var(--r-md);
    background:
      conic-gradient(from 0deg,#0a1420 25%,#122536 0 50%,#0a1420 0 75%,#122536 0) 0 0/14px 14px,
      radial-gradient(circle at 50% 50%,#152537,#0a1420);
    border:1px solid var(--border-strong);
    box-shadow:inset 0 0 0 6px var(--surface),inset 0 0 22px rgba(0,0,0,.55);
    overflow:hidden;flex:none;
  }
  /* three finder squares */
  .qr::before,.qr::after,.qr__eye{
    content:"";position:absolute;width:30px;height:30px;border-radius:5px;
    border:5px solid var(--text-soft);
  }
  .qr::before{top:12px;left:12px}
  .qr::after{top:12px;right:12px}
  .qr__eye{bottom:12px;left:12px}
  .qr__flame{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
    background:var(--ink);box-shadow:0 0 0 4px var(--ink),0 0 14px rgba(228,146,58,.6);
  }
  .qr__flame svg{width:22px;height:22px}

  .copy-row{display:flex;align-items:stretch;gap:var(--sp-3)}
  .copy-row .input{flex:1;min-width:0}
  .code-block{display:flex;flex-direction:column;align-items:center;gap:.25rem;text-align:center}
  .code-block .code{font-size:2.4rem;letter-spacing:.34em;font-weight:700;padding-left:.34em}
  .qr-block{display:flex;gap:var(--sp-5);align-items:center}
  @media(max-width:440px){.qr-block{flex-direction:column;text-align:center}}
</style>
</head>
<body class="night">

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="fl" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0" stop-color="#D2532A"/><stop offset=".55" stop-color="#E4923A"/><stop offset="1" stop-color="#F6CE8B"/>
  </linearGradient>
</defs></svg>

<!-- ===== SIMPLIFIED ROOM BEHIND ===== -->
<div class="back" aria-hidden="true">
  <header class="back__bar">
    <div class="inner">
      <div class="cluster gap-4">
        <a class="brand" href="index.html" style="font-size:1.05rem"><svg class="flame" viewBox="0 0 32 32"><path d="M16 2c.6 4.2 4.8 6 6.6 9.8 1.9 4 .2 9.6-4.4 11.4-.2-2.2-.9-3.6-2.4-4.8.3 2 .1 3.6-1.1 5.2-3.3-.9-5.7-3.9-5.7-7.6 0-2.2 1-3.9 2.3-5.6.2 1.6.9 2.6 2 3.3C15 15 13.6 9 16 2Z" fill="url(#fl)"/></svg></a>
        <span class="rule" style="width:1px;height:24px"></span>
        <div class="cluster gap-2"><strong>Vespers</strong><span class="pill"><span class="dot dot--live"></span> Live</span></div>
      </div>
      <div class="cluster gap-3">
        <span class="pill"><span class="mono">312&thinsp;ms</span> · 7 present</span>
      </div>
    </div>
  </header>
  <div class="back__stagewrap">
    <div class="back__stage">
      <div class="back__glow"></div>
      <div class="back__fill"></div>
      <span class="tile__name" style="left:var(--sp-4);bottom:var(--sp-4);font-size:.95rem"><span class="dot dot--ember"></span> Pastor Ade · <span class="mono" style="font-size:.75rem">you</span></span>
    </div>
  </div>
</div>

<!-- ===== INVITE DIALOG ===== -->
<div class="scrim">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="inv-title">
    <div class="dialog__accent"></div>
    <button class="dialog__close" aria-label="Close invite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>

    <div class="dialog__head">
      <span class="eyebrow dialog__eyebrow">Vespers · live</span>
      <h2 class="dialog__title" id="inv-title">Invite to the room</h2>
    </div>

    <div class="dialog__body stack gap-5">
      <!-- invite link + copy -->
      <div class="field">
        <label class="label" for="inv-link">Invite link</label>
        <div class="copy-row">
          <input class="input mono" id="inv-link" type="text" readonly value="cenacle.app/r/K7QP2M" aria-label="Invite link">
          <button class="btn btn--ghost">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
            Copy
          </button>
        </div>
      </div>

      <!-- room code + QR -->
      <div class="qr-block">
        <div class="code-block fill">
          <span class="mono code">K7QP2M</span>
          <span class="tag">Room code</span>
        </div>
        <div class="qr" role="img" aria-label="QR code for the invite link">
          <span class="qr__eye"></span>
          <span class="qr__flame"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16 2c.6 4.2 4.8 6 6.6 9.8 1.9 4 .2 9.6-4.4 11.4-.2-2.2-.9-3.6-2.4-4.8.3 2 .1 3.6-1.1 5.2-3.3-.9-5.7-3.9-5.7-7.6 0-2.2 1-3.9 2.3-5.6.2 1.6.9 2.6 2 3.3C15 15 13.6 9 16 2Z" fill="url(#fl)"/></svg></span>
        </div>
      </div>

      <p class="hint">Anyone with the link can join. Rooms stay small on purpose.</p>
    </div>

    <div class="dialog__foot">
      <button class="btn btn--quiet">Done</button>
      <button class="btn btn--primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
        Copy link
      </button>
    </div>
  </div>
</div>

</body>
</html>
