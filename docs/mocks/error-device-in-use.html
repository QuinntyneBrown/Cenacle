<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cenacle — Camera in use</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/cenacle.css">
</head>
<body class="night">

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="fl" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0" stop-color="#D2532A"/><stop offset=".55" stop-color="#E4923A"/><stop offset="1" stop-color="#F6CE8B"/>
  </linearGradient>
</defs></svg>

<main class="state">
  <div class="state__inner">
    <div class="state__mark state__mark--danger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 10l4.5-2.6v9.2L15 14M4 7h9a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"/><path d="M3 3l18 18"/></svg>
    </div>
    <h1>Your camera is in use somewhere else</h1>
    <p>Another app or tab (a video call, maybe) is using your camera. Close it and try again — or join with camera off and just your voice.</p>
    <div class="cluster">
      <a class="btn btn--primary" href="lobby.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 8a8 8 0 1 0 .8 6M20 4v4h-4"/></svg>
        Try again
      </a>
      <a class="btn btn--ghost" href="room-participant.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 10l4.5-2.6v9.2L15 14M4 7h9a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"/><path d="M3 3l18 18"/></svg>
        Join with camera off
      </a>
    </div>
  </div>
</main>

</body>
</html>
