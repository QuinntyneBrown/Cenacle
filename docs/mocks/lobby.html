<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cenacle — Joining Vespers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/cenacle.css">
<style>
  /* page-local layout only */
  .lobby{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-block:var(--sp-7)}
  .lobby__brand{position:absolute;top:var(--sp-5);left:var(--sp-5)}
  .preview{aspect-ratio:16/10}
  .preview__fill{position:absolute;inset:0;background:radial-gradient(120% 120% at 42% 26%,#2a405a,#0c1a29)}
  .preview__glow{position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(55% 60% at 50% 32%,rgba(228,146,58,.18),transparent 72%);animation:breathe 11s var(--ease) infinite}
  .preview__pills{position:absolute;top:var(--sp-3);right:var(--sp-3);z-index:2;display:flex;flex-wrap:wrap;gap:.4rem;justify-content:flex-end}
  .devicebar{display:flex;justify-content:center;gap:var(--sp-5)}
  .avatars .pav{width:1.9rem;height:1.9rem;border-radius:50%;background:linear-gradient(140deg,#2a405a,#14243a);display:grid;place-items:center;font-weight:600;font-size:.75rem;color:var(--text);border:2px solid var(--surface)}
  .avatars .pav + .pav{margin-left:-.55rem}
  .actions{display:flex;flex-direction:column;gap:var(--sp-3)}
  @media(min-width:520px){.actions{flex-direction:row-reverse;justify-content:center;align-items:center}}
</style>
</head>
<body class="night">

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="fl" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0" stop-color="#D2532A"/><stop offset=".55" stop-color="#E4923A"/><stop offset="1" stop-color="#F6CE8B"/>
  </linearGradient>
</defs></svg>

<a class="brand lobby__brand" href="index.html"><svg class="flame" viewBox="0 0 32 32" aria-hidden="true"><path d="M16 2c.6 4.2 4.8 6 6.6 9.8 1.9 4 .2 9.6-4.4 11.4-.2-2.2-.9-3.6-2.4-4.8.3 2 .1 3.6-1.1 5.2-3.3-.9-5.7-3.9-5.7-7.6 0-2.2 1-3.9 2.3-5.6.2 1.6.9 2.6 2 3.3C15 15 13.6 9 16 2Z" fill="url(#fl)"/></svg> Cenacle <small>upper room</small></a>

<main class="lobby">
  <div class="container-narrow stack gap-5">

    <!-- self preview -->
    <div class="tile preview">
      <div class="preview__fill"></div>
      <div class="preview__glow"></div>

      <!-- camera-off state indicator (mic muted) -->
      <span class="tile__muted" aria-label="Microphone is off">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 16M9 5a3 3 0 0 1 6 1v3M15 12v-1M6 11a6 6 0 0 0 8.5 5.4M12 17v4"/></svg>
      </span>

      <div class="preview__pills">
        <span class="pill pill--sage"><span class="dot dot--sage"></span> Preview only</span>
      </div>

      <span class="tile__name">You</span>
    </div>

    <!-- pre-join device controls -->
    <div class="devicebar" role="group" aria-label="Set your microphone and camera before entering">
      <div class="tc">
        <button class="control control--off" type="button" aria-label="Microphone off — turn on" aria-pressed="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 16M9 5a3 3 0 0 1 6 1v3M15 12v-1M6 11a6 6 0 0 0 8.5 5.4M12 17v4"/></svg>
        </button>
        <div class="control__label">Mic off</div>
      </div>
      <div class="tc">
        <button class="control" type="button" aria-label="Camera on — turn off" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10l4.5-2.6v9.2L15 14M4 7h9a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"/></svg>
        </button>
        <div class="control__label">Camera on</div>
      </div>
    </div>

    <!-- heading -->
    <div class="tc stack gap-3">
      <p class="eyebrow is-plain">Green room</p>
      <h1 class="h2">Joining Vespers</h1>
      <p class="lede" style="margin-inline:auto">Hosted by Pastor Ade · <span class="mono">7</span> already here.</p>
      <div class="cluster gap-3" style="justify-content:center">
        <div class="cluster avatars" style="--gap:0" aria-label="Seven people are already in the room">
          <span class="pav">A</span>
          <span class="pav">M</span>
          <span class="pav">J</span>
          <span class="pav">G</span>
          <span class="pav">D</span>
          <span class="pav">R</span>
          <span class="pav">S</span>
        </div>
        <span class="tag">and you</span>
      </div>
    </div>

    <!-- name + captions in a card -->
    <div class="card stack gap-5" style="max-width:32rem;margin-inline:auto;width:100%">
      <div class="field">
        <label class="label" for="name">Your name</label>
        <input class="input" id="name" name="name" type="text" value="Thomas" autocomplete="name" placeholder="How should we call you?">
        <p class="hint">This is the name the room will see.</p>
      </div>

      <div class="between">
        <label class="switch" for="captions">
          <input type="checkbox" id="captions" checked>
          <span class="track"></span>
          <span>Live captions</span>
        </label>
        <span class="pill"><span class="mono">on</span></span>
      </div>

      <span class="seal" style="align-self:flex-start">
        <span class="seal__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 8.3-7 9.5C8 19.3 5 15.4 5 11V6l7-3Z"/><path d="M9 12l2 2 4-4"/></svg></span>
        <span>Captions run <b>on-device</b> · <span class="mono">0 requests</span></span>
      </span>
    </div>

    <!-- actions -->
    <div class="actions">
      <a class="btn btn--primary btn--lg" href="room-participant.html">
        Enter the room
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M13 5l7 7-7 7"/></svg>
      </a>
      <a class="btn btn--quiet" href="landing.html">Back</a>
    </div>

    <p class="hint tc">Your camera and mic go live the moment you enter.</p>

  </div>
</main>

</body>
</html>
